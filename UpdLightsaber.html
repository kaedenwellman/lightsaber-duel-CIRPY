<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lightsaber Duel</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --blue:   #3af;
    --red:    #f33;
    --bg:     #05050f;
    --border: #1a1a3a;
    --text:   #c8d8ff;
    --dim:    #5566aa;
    --green:  #0f9;
    --gold:   #fc0;
    --font-ui: 'Orbitron', monospace;
    --font-mo: 'Share Tech Mono', monospace;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-mo);
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
  }

  #root {
    width: min(900px, 100vw);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 10px;
    padding: 0 12px;
  }

  #title {
    font-family: var(--font-ui);
    font-size: clamp(16px, 3.5vw, 28px);
    font-weight: 900;
    letter-spacing: 0.25em;
    color: var(--blue);
    text-shadow: 0 0 20px #3af8, 0 0 40px #3af4;
  }

  /* HUD */
  #hud {
    width: 100%;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 10px;
  }
  .hp-wrap { display: flex; flex-direction: column; gap: 3px; }
  .hp-label { font-family: var(--font-ui); font-size: 9px; letter-spacing: 0.1em; color: var(--dim); }
  .hp-track { height: 7px; background: var(--border); border-radius: 4px; overflow: hidden; }
  .hp-fill  { height: 100%; border-radius: 4px; transition: width 0.3s; }
  #php { background: var(--blue); width: 100%; }
  #ehp { background: var(--red);  width: 100%; }
  .hp-wrap.enemy .hp-label { text-align: right; }
  .hp-wrap.enemy .hp-track { direction: rtl; }
  #score {
    font-family: var(--font-ui);
    font-size: 10px;
    color: var(--gold);
    text-align: center;
    letter-spacing: 0.12em;
  }
  #score span { font-size: 22px; font-weight: 700; display: block; }

  /* Canvas */
  #wrap { position: relative; width: 100%; }
  #gc {
    background: #06060e;
    border: 1px solid var(--border);
    border-radius: 4px;
    display: block;
    width: 100%;
  }

  /* Overlay */
  #ov {
    position: absolute; inset: 0;
    background: rgba(5,5,15,0.88);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 14px; border-radius: 4px; z-index: 10;
  }
  #ov.hidden { display: none; }
  #ov-title { font-family: var(--font-ui); font-size: clamp(18px,4vw,38px); font-weight: 900; letter-spacing: 0.2em; }
  #ov-sub   { font-size: 12px; color: var(--dim); text-align: center; max-width: 320px; line-height: 1.8; }
  #ov-btn   {
    font-family: var(--font-ui); font-size: 11px; letter-spacing: 0.15em;
    padding: 9px 26px; border: 1px solid currentColor; border-radius: 3px;
    background: transparent; cursor: pointer; margin-top: 6px;
    transition: opacity 0.15s;
  }
  #ov-btn:hover { opacity: 0.7; }

  /* Bottom row */
  #bottom {
    width: 100%;
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 8px;
  }

  /* Connection */
  #conn { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--dim); }
  #dot  { width: 8px; height: 8px; border-radius: 50%; background: var(--red); transition: background 0.3s; }
  #dot.on { background: var(--green); box-shadow: 0 0 6px var(--green); }
  #conn-btn {
    font-family: var(--font-ui); font-size: 10px; letter-spacing: 0.1em;
    padding: 5px 14px; border: 1px solid var(--blue); border-radius: 3px;
    background: transparent; color: var(--blue); cursor: pointer; transition: all 0.15s;
  }
  #conn-btn:hover { background: rgba(51,170,255,0.12); }
  #conn-btn:disabled { opacity: 0.4; cursor: default; }

  /* Direction grid */
  #dirs { display: flex; gap: 6px; align-items: center; }
  .dlbl { font-size: 9px; color: var(--dim); letter-spacing: 0.08em; }
  .dgrid { display: grid; grid-template-columns: repeat(3,26px); grid-template-rows: repeat(3,26px); gap: 2px; }
  .dc {
    display: flex; align-items: center; justify-content: center;
    font-size: 14px; border: 1px solid var(--border); border-radius: 3px;
    color: var(--dim); transition: all 0.1s;
  }
  .dc.lit {
    color: var(--blue); border-color: var(--blue);
    text-shadow: 0 0 8px var(--blue); background: rgba(51,170,255,0.12);
  }

  /* Wave / diff */
  #waveinfo { font-size: 10px; color: var(--dim); text-align: right; }

  /* Debug */
  #dbg { width: 100%; font-size: 11px; color: #fff; text-align: center; height: 16px; font-family: var(--font-mo); }
</style>
</head>
<body>
<div id="root">
  <div id="title">⚔ Lightsaber Duel</div>

  <div id="hud">
    <div class="hp-wrap player">
      <div class="hp-label">YOU &nbsp;•&nbsp; <span id="phv">100</span> HP</div>
      <div class="hp-track"><div class="hp-fill" id="php"></div></div>
    </div>
    <div id="score"><span id="sv">0</span>BLOCKS</div>
    <div class="hp-wrap enemy">
      <div class="hp-label"><span id="ehv">100</span> HP &nbsp;•&nbsp; ENEMY</div>
      <div class="hp-track"><div class="hp-fill" id="ehp"></div></div>
    </div>
  </div>

  <div id="wrap">
    <canvas id="gc" width="900" height="380"></canvas>
    <div id="ov">
      <div id="ov-title" style="color:var(--blue)">READY, JEDI?</div>
      <div id="ov-sub">Connect your board via USB, then press BEGIN.</div>
      <button id="ov-btn" style="color:var(--blue)" onclick="startGame()">BEGIN</button>
    </div>
  </div>

  <div id="bottom">
    <div id="conn">
      <div id="dot"></div>
      <span id="clbl">Disconnected</span>
      <button id="conn-btn" onclick="connectSerial()">Connect board</button>
    </div>
    <div id="dirs">
      <span class="dlbl">YOUR SABER</span>
      <div class="dgrid">
        <div class="dc" id="d-nw"></div>
        <div class="dc" id="d-up">▲</div>
        <div class="dc" id="d-ne"></div>
        <div class="dc" id="d-left">◀</div>
        <div class="dc" id="d-center">✦</div>
        <div class="dc" id="d-right">▶</div>
        <div class="dc" id="d-sw"></div>
        <div class="dc" id="d-down">▼</div>
        <div class="dc" id="d-se"></div>
      </div>
    </div>
    <div id="waveinfo">WAVE <span id="wv">1</span> &nbsp;|&nbsp; <span id="dlbl2">EASY</span></div>
  </div>

  <div id="dbg">—</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════════════════
// SERIAL — simple, no timeouts, no reconnect complexity
// ═══════════════════════════════════════════════════════════════════════
let port     = null;
let reader   = null;
let writer   = null;
let lineBuf  = '';
let connected = false;

async function connectSerial() {
  if (!('serial' in navigator)) {
    dbg('Web Serial not supported — use Chrome');
    return;
  }
  try {
    port   = await navigator.serial.requestPort();
    await port.open({ baudRate: 115200 });
    reader = port.readable.getReader();
    writer = port.writable.getWriter();
    connected = true;
    document.getElementById('dot').classList.add('on');
    document.getElementById('clbl').textContent = 'Board connected';
    document.getElementById('conn-btn').disabled = true;
    dbg('Connected — press BEGIN to start');
    readLoop();
  } catch(e) {
    dbg('Connect failed: ' + e.message);
  }
}

async function readLoop() {
  const dec = new TextDecoder();
  try {
    while (true) {
      const { value, done } = await reader.read();
      if (done) { dbg('Stream ended'); break; }
      const text = dec.decode(value, { stream: true });
      lineBuf += text;
      const lines = lineBuf.split('\n');
      lineBuf = lines.pop();
      for (const line of lines) {
        const t = line.trim();
        if (t) onLine(t);
      }
    }
  } catch(e) {
    dbg('Serial lost: ' + e.message);
  } finally {
    connected = false;
    document.getElementById('dot').classList.remove('on');
    document.getElementById('clbl').textContent = 'Disconnected';
    document.getElementById('conn-btn').disabled = false;
    try { reader.releaseLock(); } catch(_) {}
  }
}
function onLine(line) {
  dbg(line.slice(0, 60));
  if (!line.startsWith('{')) return;
  try {
    const f = JSON.parse(line);
    setPlayerDir(f.d || 'NONE');
  } catch(_) {}
}

async function sendToBoard(msg) {
  if (!writer) return;
  try {
    await writer.write(new TextEncoder().encode(msg + '\n'));
  } catch(_) {}
}

// ═══════════════════════════════════════════════════════════════════════
// GAME STATE
// ═══════════════════════════════════════════════════════════════════════
let gameRunning  = false;
let playerHP     = 100;
let enemyHP      = 100;
let score        = 0;
let wave         = 1;
let playerDir    = 'NONE';
let enemyDir     = 'NONE';
let telegraph    = 'NONE';
let telegraphTimer = 0;
let swingCooldown  = 90;
let clashTimer     = 0;
let missFlash      = 0;
let hitFlash       = 0;
let particles      = [];
let lastFrame      = 0;

function diff() {
  const interval = Math.max(40, 120 - (wave-1)*10);
  const warn     = Math.max(18, 55 - (wave-1)*5);
  const label    = wave<=3?'EASY':wave<=6?'MEDIUM':wave<=9?'HARD':'DARK SIDE';
  return { interval, warn, label };
}

function startGame() {
  playerHP = 100; enemyHP = 100; score = 0; wave = 1;
  playerDir = 'NONE'; enemyDir = 'NONE';
  telegraph = 'NONE'; telegraphTimer = 0; swingCooldown = 90;
  clashTimer = 0; missFlash = 0; hitFlash = 0; particles = [];
  pAngle = DA['NONE']; eAngle = EDA['NONE'];
  updateHP(); updateScore(); updateWave();
  setPlayerDir('NONE');
  document.getElementById('ov').classList.add('hidden');
  gameRunning = true;
}

function endGame(won) {
  gameRunning = false;
  sendToBoard(won ? 'WIN' : 'LOSE');
  const ov  = document.getElementById('ov');
  const t   = document.getElementById('ov-title');
  const s   = document.getElementById('ov-sub');
  const b   = document.getElementById('ov-btn');
  if (won) {
    t.textContent = 'VICTORY';
    t.style.color = 'var(--green)';
    s.textContent = `Wave ${wave} • ${score} blocks. The Force is strong with you.`;
    b.style.color = 'var(--green)';
  } else {
    t.textContent = 'DEFEATED';
    t.style.color = 'var(--red)';
    s.textContent = `${score} blocks before falling. Train harder, Padawan.`;
    b.style.color = 'var(--red)';
  }
  b.textContent = 'DUEL AGAIN';
  ov.classList.remove('hidden');
}

function updateHP() {
  document.getElementById('php').style.width = playerHP + '%';
  document.getElementById('ehp').style.width = enemyHP  + '%';
  document.getElementById('phv').textContent  = playerHP;
  document.getElementById('ehv').textContent  = enemyHP;
}
function updateScore() { document.getElementById('sv').textContent = score; }
function updateWave()  {
  document.getElementById('wv').textContent    = wave;
  document.getElementById('dlbl2').textContent = diff().label;
}

function setPlayerDir(dir) {
  playerDir = dir;
  const map = {UP:'up',DOWN:'down',LEFT:'left',RIGHT:'right',NONE:'center'};
  ['up','down','left','right','center'].forEach(k =>
    document.getElementById('d-'+k).classList.remove('lit'));
  document.getElementById('d-'+(map[dir]||'center')).classList.add('lit');
}

// ═══════════════════════════════════════════════════════════════════════
// GAME LOGIC
// ═══════════════════════════════════════════════════════════════════════
function gameUpdate(dt) {
  if (!gameRunning) return;
  const d = diff();

  if (swingCooldown > 0) { swingCooldown -= dt; return; }

  if (telegraphTimer <= 0 && telegraph === 'NONE') {
    const opts = ['LEFT','RIGHT','UP','DOWN'];
    telegraph = opts[Math.floor(Math.random()*opts.length)];
    telegraphTimer = d.warn;
  }

  if (telegraphTimer > 0) {
    telegraphTimer -= dt;
    if (telegraphTimer <= 0) {
      enemyDir = telegraph;
      telegraph = 'NONE';
      resolve();
    }
  }
}

function resolve() {
  const blocked = playerDir === enemyDir;
  if (blocked) {
    score++;
    enemyHP = Math.max(0, enemyHP - 20);
    clashTimer = 18; hitFlash = 10;
    spawnParticles();
    //sendToBoard('HIT');
    updateScore(); updateHP();
    if (score % 5 === 0) { wave++; updateWave(); }
    if (enemyHP <= 0) { endGame(true); return; }
  } else {
    playerHP = Math.max(0, playerHP - 15);
    missFlash = 12;
    //sendToBoard('MISS');
    updateHP();
    if (playerHP <= 0) { endGame(false); return; }
  }
  enemyDir = 'NONE';
  swingCooldown = diff().interval;
}

// ═══════════════════════════════════════════════════════════════════════
// CANVAS RENDERING
// ═══════════════════════════════════════════════════════════════════════
const canvas = document.getElementById('gc');
const ctx    = canvas.getContext('2d');
const W = 900, H = 380;

const PB = {x:200, y:320};
const EB = {x:700, y:320};
const SL = 210;

const DA  = {NONE:-Math.PI*0.5, UP:-Math.PI*0.85, DOWN:-Math.PI*0.15, LEFT:-Math.PI*0.65, RIGHT:-Math.PI*0.35};
const EDA = {NONE:-Math.PI*0.5, UP:-Math.PI*0.85, DOWN:-Math.PI*0.15, LEFT:-Math.PI*0.35, RIGHT:-Math.PI*0.65};

let pAngle = DA['NONE'];
let eAngle = EDA['NONE'];

function spawnParticles() {
  for (let i=0;i<24;i++) {
    const a = Math.random()*Math.PI*2;
    const s = 2+Math.random()*5;
    particles.push({
      x:(PB.x+EB.x)/2, y:PB.y-60,
      vx:Math.cos(a)*s, vy:Math.sin(a)*s,
      life:1, decay:0.04+Math.random()*0.05,
      size:1.5+Math.random()*3,
      col:Math.random()<0.5?'#3af':'#f33'
    });
  }
}

function drawSaber(px, py, angle, glow) {
  const tx = px + Math.cos(angle)*SL;
  const ty = py + Math.sin(angle)*SL;
  for (const [w,a] of [[18,0.1],[10,0.2],[5,0.45],[2,0.9]]) {
    ctx.save();
    ctx.strokeStyle = glow; ctx.lineWidth = w;
    ctx.globalAlpha = a; ctx.lineCap = 'round';
    ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(tx,ty); ctx.stroke();
    ctx.restore();
  }
  ctx.save();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.globalAlpha=0.95; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(tx,ty); ctx.stroke();
  ctx.restore();
  // hilt
  const hx = px-Math.cos(angle)*28, hy = py-Math.sin(angle)*28;
  ctx.save();
  ctx.strokeStyle='#888'; ctx.lineWidth=6; ctx.lineCap='round';
  ctx.beginPath(); ctx.moveTo(px,py); ctx.lineTo(hx,hy); ctx.stroke();
  ctx.restore();
}

function drawTelegraph(dir, progress) {
  if (dir==='NONE') return;
  const labels = {LEFT:'◀ LEFT',RIGHT:'RIGHT ▶',UP:'▲ UP',DOWN:'▼ DOWN'};
  ctx.save();
  ctx.globalAlpha = 0.3 + progress*0.55;
  ctx.font = 'bold 26px Orbitron, monospace';
  ctx.fillStyle = '#f44'; ctx.textAlign = 'center';
  ctx.fillText('BLOCK ' + labels[dir], W/2, 34);
  ctx.restore();
}

function render(ts) {
  requestAnimationFrame(render);
  const dt = Math.min((ts - lastFrame)/( 1000/60), 3);
  lastFrame = ts;

  // lerp saber angles
  const sp = dt * 0.2;
  pAngle += ((DA[playerDir]  ?? DA['NONE'])  - pAngle) * Math.min(sp,1);
  eAngle += ((EDA[enemyDir] ?? EDA['NONE']) - eAngle) * Math.min(sp,1);

  // update particles
  particles = particles.filter(p=>p.life>0);
  for (const p of particles) {
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.1; p.life-=p.decay;
  }

  // timers
  if (clashTimer>0) clashTimer = Math.max(0,clashTimer-dt);
  if (missFlash>0)  missFlash  = Math.max(0,missFlash-dt);
  if (hitFlash>0)   hitFlash   = Math.max(0,hitFlash-dt);

  // game logic
  gameUpdate(dt);

  // clear
  ctx.clearRect(0,0,W,H);

  // floor
  ctx.save(); ctx.strokeStyle='#1a1a3a'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,350); ctx.lineTo(W,350); ctx.stroke();
  ctx.restore();

  // flashes
  if (missFlash>0) {
    ctx.save(); ctx.globalAlpha=missFlash/12*0.3; ctx.fillStyle='#f22';
    ctx.fillRect(0,0,W,H); ctx.restore();
  }
  if (hitFlash>0) {
    ctx.save(); ctx.globalAlpha=hitFlash/10*0.2; ctx.fillStyle='#0f8';
    ctx.fillRect(0,0,W,H); ctx.restore();
  }

  // telegraph
  if (telegraph !== 'NONE') {
    const d = diff();
    const prog = telegraphTimer > 0 ? 1-(telegraphTimer/d.warn) : 0;
    drawTelegraph(telegraph, prog);
  }

  // sabers
  const cg = clashTimer>0 ? 1.4+clashTimer*0.2 : 1;
  drawSaber(PB.x, PB.y, pAngle, '#33aaff');
  drawSaber(EB.x, EB.y, eAngle, '#ff3333');

  // clash flash
  if (clashTimer>8) {
    const cx=(PB.x+EB.x)/2, cy=PB.y-70;
    const g=ctx.createRadialGradient(cx,cy,0,cx,cy,70*(clashTimer/12));
    g.addColorStop(0,'rgba(255,255,255,0.85)');
    g.addColorStop(0.3,'rgba(160,160,255,0.35)');
    g.addColorStop(1,'rgba(0,0,0,0)');
    ctx.save(); ctx.fillStyle=g;
    ctx.beginPath(); ctx.arc(cx,cy,80,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // particles
  for (const p of particles) {
    ctx.save(); ctx.globalAlpha=p.life;
    ctx.fillStyle=p.col;
    ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    ctx.restore();
  }

  // labels
  ctx.save(); ctx.font='10px "Share Tech Mono",monospace';
  ctx.fillStyle='#3af'; ctx.textAlign='center'; ctx.globalAlpha=0.6;
  ctx.fillText('YOU',PB.x,362);
  ctx.fillStyle='#f33';
  ctx.fillText('ENEMY',EB.x,362);
  ctx.restore();
}

// ═══════════════════════════════════════════════════════════════════════
// KEYBOARD FALLBACK
// ═══════════════════════════════════════════════════════════════════════
const KMAP = {ArrowLeft:'LEFT',ArrowRight:'RIGHT',ArrowUp:'UP',ArrowDown:'DOWN'};
window.addEventListener('keydown', e => { if (KMAP[e.key]) setPlayerDir(KMAP[e.key]); });
window.addEventListener('keyup',   e => { if (KMAP[e.key]) setPlayerDir('NONE'); });

// ═══════════════════════════════════════════════════════════════════════
// UTILS
// ═══════════════════════════════════════════════════════════════════════
function dbg(msg) { document.getElementById('dbg').textContent = msg; }

// kick off render loop
requestAnimationFrame(render);
</script>
</body>
</html>
